<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta property="og:image" content="../images/bg/poster.jpg">
    <title>Trip Blogs - Kingcean</title>
    <link href="https://cdn.jsdelivr.net/npm/hje@2.4.6/docs/css/site.p.css" rel="stylesheet" />
    <link href="../css/current.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/vs2015.min.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="../images/logos/tuans-s.png" />
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/marked@16.2.1/lib/marked.umd.js" ></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/hje@2.4.6/docs/js/mdblogs.js" ></script>
    <script type="text/javascript">
    const strings = {
        sites: "Sites",
        "sites#zh": "站点",
        home: "Home",
        "home#zh": "主页",
        fe: "FE",
        "fe#zh": "前端",
        community: "Community",
        "community#zh": "社区",
        otherLinks: "Other links",
        "otherLinks#zh": "更多链接",
        jinchenArt: "Jinchen Art",
        "jinchenArt#zh": "金辰艺术",
        travelNotes: "Travel notes",
        "travelNotes#zh": "游记",
        name: "Kingcean"
    };
    function onInit() {
        DeepX.MdBlogs.render("blog_content", "./config.json", { title: true });
        DeepX.MdBlogs.setElementText("topmenu-blogs", "blogs");
        DeepX.MdBlogs.setElementProp("menu-fe", null, DeepX.MdBlogs.getLocaleProp(strings, "fe"));
        DeepX.MdBlogs.setElementProp("footer-text-sub", null, DeepX.MdBlogs.getLocaleProp(strings, "travelNotes"));
    }
    </script>
</head>
<body onload="onInit()">
    <header>
        <section>
            <h1><img alt="Kingcean.org" src="../images/logos/tuans-s.png" /><a href="https://kingcean.github.io/"><strong>Kingcean</strong></a></h1>
            <ul>
                <li>
                    <a id="menu-net" href="https://kingcean.net/">.NET</a>
                </li>
                <li>
                    <a id="menu-fe" href="https://kingcean.org/">FE</a>
                </li>
            </ul>
        </section>
    </header>
    <section id="blog_content" ></section>
    <footer>
        <section>
            <div class="x-copyright">
                <span><span>&copy; Kingcean Tuan 2025</span><span> &nbsp; | &nbsp; </span><span id="footer-text-sub">Home</span></span>
            </div>
        </section>
    </footer>
</body>
</html>
